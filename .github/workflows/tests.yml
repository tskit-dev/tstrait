name: Tests

on:
  pull_request:
  push:
    branches: [main, test]
  merge_group:

permissions:
  contents: read

jobs:
  packaging:
    name: Python packaging
    uses: tskit-dev/.github/.github/workflows/python-packaging.yml@v17

  test:
    name: Python
    # Trusted first-party tskit-dev reusable workflow that needs inherited
    # secrets (e.g. CODECOV_TOKEN).
    uses: tskit-dev/.github/.github/workflows/python-tests.yml@v17 # zizmor: ignore[secrets-inherit]
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python }}
      coverage-directory: tstrait
    secrets: inherit
    strategy:
      matrix:
        python: ["3.11", "3.13"]
        os: [macos-latest, ubuntu-24.04, windows-latest]
